services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - docker-local.env
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started

  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    env_file:
      - docker-local.env

  ollama:
    image: ollama/ollama
    ports:
      - "${OLLAMA_PORT}:${OLLAMA_PORT}"
    volumes:
      - ollama_data:/root/.ollama
    env_file:
      - docker-local.env

volumes:
  postgres_data:
  ollama_data:
